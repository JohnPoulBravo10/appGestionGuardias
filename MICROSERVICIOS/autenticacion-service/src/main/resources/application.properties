# ──────────────────────────────────────────────────────────────────
# Resilience4J Retry - Configuración para tolerar el delay del
# discovery-service durante el arranque de la aplicación.
# ──────────────────────────────────────────────────────────────────

# Cantidad máxima de intentos (1 original + 4 reintentos)
resilience4j.retry.instances.empleadoService.max-attempts=5

# Tiempo de espera inicial entre reintentos (5 segundos)
resilience4j.retry.instances.empleadoService.wait-duration=5s

# Habilitar backoff exponencial para escalar la espera progresivamente
resilience4j.retry.instances.empleadoService.enable-exponential-backoff=true

# Multiplicador del backoff (cada reintento espera el doble)
resilience4j.retry.instances.empleadoService.exponential-backoff-multiplier=2

# Tiempo máximo de espera entre reintentos (tope de 30 segundos)
resilience4j.retry.instances.empleadoService.max-wait-duration=30s

# Excepciones que activan el reintento: errores Feign por servicio no descubierto
resilience4j.retry.instances.empleadoService.retry-exceptions=feign.FeignException,feign.RetryableException,java.net.ConnectException

