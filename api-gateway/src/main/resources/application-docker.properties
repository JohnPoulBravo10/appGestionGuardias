# Perfil Docker para api-gateway
# Sobreescribe Eureka URL y CORS para entorno Docker

eureka.client.service-url.defaultZone=http://discovery-server:8761/eureka/

# CORS actualizado para ambos frontends en Docker
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedOrigins=http://localhost:5173,http://localhost:5174,http://localhost:5175
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedMethods=GET,POST,PUT,DELETE,OPTIONS
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedHeaders=*
