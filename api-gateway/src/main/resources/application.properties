spring.application.name=api-gateway

server.port=8090

eureka.client.service-url.defaultZone=http://localhost:8761/eureka

spring.cloud.gateway.server.webflux.discovery.locator.enabled=true
spring.cloud.gateway.server.webflux.discovery.locator.lower-case-service-id=true

# Empleado Service
spring.cloud.gateway.server.webflux.routes[0].id=empleado-service
spring.cloud.gateway.server.webflux.routes[0].uri=lb://EMPLEADO-SERVICE
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/api/empleados/**

# Guardia Service
spring.cloud.gateway.server.webflux.routes[1].id=guardia-service
spring.cloud.gateway.server.webflux.routes[1].uri=lb://GUARDIA-SERVICE
spring.cloud.gateway.server.webflux.routes[1].predicates[0]=Path=/api/guardias/**

# Autenticacion Service
spring.cloud.gateway.server.webflux.routes[2].id=autenticacion-service
spring.cloud.gateway.server.webflux.routes[2].uri=lb://AUTENTICACION-SERVICE
spring.cloud.gateway.server.webflux.routes[2].predicates[0]=Path=/auth/**

# CORS
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedOrigins=http://localhost:5173,http://localhost:5174,http://localhost:5175
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedMethods=GET,POST,PUT,DELETE,OPTIONS
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedHeaders=*